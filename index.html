<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Maze TD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 2rem;
      color: #e8c84e;
      letter-spacing: 4px;
      margin-bottom: 6px;
      text-shadow: 0 0 24px #e8c84e55;
    }
    #subtitle {
      color: #8b949e;
      margin-bottom: 20px;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    #game-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    canvas {
      border: 2px solid #30363d;
      cursor: crosshair;
      display: block;
    }
    #status-bar {
      color: #8b949e;
      font-size: 0.78rem;
      margin-top: 6px;
      height: 1.2em;
    }
    #sidebar { width: 200px; }
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .panel h3 {
      color: #e8c84e;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .tower-btn {
      width: 100%;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 7px 10px;
      margin-bottom: 5px;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      font-size: 0.82rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .tower-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .tower-btn.active { background: #1f3250; border-color: #58a6ff; color: #58a6ff; }
    #offset-toggle {
      width: 100%;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 7px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      transition: all 0.15s;
      margin-bottom: 8px;
    }
    #offset-toggle.active {
      background: #2d1f3d;
      border-color: #a855f7;
      color: #a855f7;
    }
    .hint {
      color: #8b949e;
      font-size: 0.75rem;
      line-height: 1.6;
    }
    .hint strong { color: #c9d1d9; }
    #clear-btn {
      width: 100%;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 7px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      transition: all 0.15s;
    }
    #clear-btn:hover { border-color: #ff4a4a; color: #ff4a4a; }
  </style>
</head>
<body>
  <h1>MAZE TD</h1>
  <p id="subtitle">Steg 1 — Grid &amp; Offset-system</p>

  <div id="game-container">
    <div>
      <canvas id="canvas"></canvas>
      <div id="status-bar">Hovrar: —</div>
    </div>

    <div id="sidebar">
      <div class="panel">
        <h3>Torn — Tor</h3>
        <button class="tower-btn active" data-tower="grundsten" data-w="1" data-h="1">Grundsten (1x1)</button>
        <button class="tower-btn" data-tower="askledare" data-w="1" data-h="1">Askledare (1x1)</button>
        <button class="tower-btn" data-tower="stormvakt" data-w="1" data-h="1">Stormvakt (1x1)</button>
        <button class="tower-btn" data-tower="mjolner" data-w="2" data-h="2">Mjolner (2x2)</button>
      </div>

      <div class="panel">
        <h3>Placering</h3>
        <button id="offset-toggle">Offset: AV</button>
        <p class="hint">
          Offset placerar torn pa gransen mellan rutor — karna i maze-estetiken.<br><br>
          Hall <strong>Shift</strong> for snabb offset.
        </p>
      </div>

      <div class="panel">
        <h3>Kontroller</h3>
        <p class="hint">
          <strong>Vansterklick</strong> — Placera torn<br>
          <strong>Hogerklick</strong> — Ta bort torn<br>
          <strong>Shift</strong> — Hall for offset<br>
          <strong>Tab</strong> — Byt torn<br>
          <strong>O</strong> — Toggla offset
        </p>
      </div>

      <div class="panel">
        <button id="clear-btn">Rensa alla torn</button>
      </div>
    </div>
  </div>

  <script>
    const COLS = 22;
    const ROWS = 22;
    const CELL = 32;

    const canvas = document.getElementById('canvas');
    canvas.width  = COLS * CELL;
    canvas.height = ROWS * CELL;
    const ctx = canvas.getContext('2d');

    const ENTRY = { col: Math.floor(COLS / 2), row: 0 };
    const EXIT  = { col: Math.floor(COLS / 2), row: ROWS - 1 };

    const TOWER_COLORS = {
      grundsten: { fill: '#0e2240', stroke: '#4a9eff', label: 'G' },
      askledare: { fill: '#0e2a30', stroke: '#00cfff', label: 'A' },
      stormvakt: { fill: '#0e1a35', stroke: '#7eb8ff', label: 'S' },
      mjolner:   { fill: '#2a1a05', stroke: '#e8c84e', label: 'M' },
    };

    const TOWER_DATA = {
      grundsten: { w: 1, h: 1 },
      askledare: { w: 1, h: 1 },
      stormvakt: { w: 1, h: 1 },
      mjolner:   { w: 2, h: 2 },
    };
    const TOWER_ORDER = ['grundsten', 'askledare', 'stormvakt', 'mjolner'];

    let towers = [];
    let hoverPos = null;
    let offsetMode = false;
    let selectedTower = { type: 'grundsten', w: 1, h: 1 };

    // ---- Snap ----
    function snap(px, py, useOffset, tw, th) {
      let gx = px / CELL;
      let gy = py / CELL;
      if (useOffset) {
        gx = Math.round(gx * 2) / 2;
        gy = Math.round(gy * 2) / 2;
      } else {
        gx = Math.floor(gx);
        gy = Math.floor(gy);
      }
      gx = Math.max(0, Math.min(COLS - tw, gx));
      gy = Math.max(0, Math.min(ROWS - th, gy));
      return { x: gx, y: gy };
    }

    // ---- Collision ----
    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function canPlace(x, y, w, h) {
      if (x < 0 || y < 0 || x + w > COLS || y + h > ROWS) return false;
      // Protect entry and exit cells
      if (rectsOverlap(x, y, w, h, ENTRY.col, ENTRY.row, 1, 1)) return false;
      if (rectsOverlap(x, y, w, h, EXIT.col, EXIT.row, 1, 1)) return false;
      for (const t of towers) {
        if (rectsOverlap(x, y, w, h, t.x, t.y, t.w, t.h)) return false;
      }
      return true;
    }

    function removeTowerAt(px, py) {
      const gx = px / CELL;
      const gy = py / CELL;
      towers = towers.filter(t => !(gx >= t.x && gx < t.x + t.w && gy >= t.y && gy < t.y + t.h));
    }

    // ---- Drawing ----
    function drawGrid() {
      ctx.strokeStyle = '#1c2128';
      ctx.lineWidth = 1;
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, ROWS * CELL);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(COLS * CELL, r * CELL);
        ctx.stroke();
      }
    }

    function drawOffsetGrid() {
      if (!offsetMode) return;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([2, 6]);
      for (let c = 0; c <= COLS * 2; c++) {
        if (c % 2 === 0) continue; // skip main grid lines
        ctx.beginPath();
        ctx.moveTo(c * CELL * 0.5, 0);
        ctx.lineTo(c * CELL * 0.5, ROWS * CELL);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS * 2; r++) {
        if (r % 2 === 0) continue;
        ctx.beginPath();
        ctx.moveTo(0, r * CELL * 0.5);
        ctx.lineTo(COLS * CELL, r * CELL * 0.5);
        ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawTower(x, y, w, h, type, alpha) {
      const c = TOWER_COLORS[type];
      const px = x * CELL, py = y * CELL;
      const pw = w * CELL, ph = h * CELL;
      const pad = 2;
      ctx.save();
      ctx.globalAlpha = alpha !== undefined ? alpha : 1;
      ctx.fillStyle = c.fill;
      ctx.fillRect(px + pad, py + pad, pw - pad * 2, ph - pad * 2);
      ctx.strokeStyle = c.stroke;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(px + pad, py + pad, pw - pad * 2, ph - pad * 2);
      ctx.fillStyle = c.stroke;
      ctx.font = `bold ${Math.min(pw, ph) * 0.38}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(c.label, px + pw / 2, py + ph / 2);
      ctx.restore();
    }

    function drawEntryExit() {
      // Entry
      ctx.fillStyle = '#0d2b0d';
      ctx.fillRect(ENTRY.col * CELL + 1, ENTRY.row * CELL + 1, CELL - 2, CELL - 2);
      ctx.strokeStyle = '#4aff4a';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(ENTRY.col * CELL + 1, ENTRY.row * CELL + 1, CELL - 2, CELL - 2);
      ctx.fillStyle = '#4aff4a';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('IN', (ENTRY.col + 0.5) * CELL, (ENTRY.row + 0.5) * CELL);

      // Exit
      ctx.fillStyle = '#2b0d0d';
      ctx.fillRect(EXIT.col * CELL + 1, EXIT.row * CELL + 1, CELL - 2, CELL - 2);
      ctx.strokeStyle = '#ff4a4a';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(EXIT.col * CELL + 1, EXIT.row * CELL + 1, CELL - 2, CELL - 2);
      ctx.fillStyle = '#ff4a4a';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('UT', (EXIT.col + 0.5) * CELL, (EXIT.row + 0.5) * CELL);
    }

    function render() {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawOffsetGrid();
      drawEntryExit();

      for (const t of towers) {
        drawTower(t.x, t.y, t.w, t.h, t.type);
      }

      if (hoverPos) {
        const valid = canPlace(hoverPos.x, hoverPos.y, selectedTower.w, selectedTower.h);
        drawTower(hoverPos.x, hoverPos.y, selectedTower.w, selectedTower.h, selectedTower.type, valid ? 0.55 : 0.2);
        if (!valid) {
          ctx.save();
          ctx.strokeStyle = '#ff4a4a';
          ctx.lineWidth = 2;
          ctx.strokeRect(hoverPos.x * CELL + 2, hoverPos.y * CELL + 2, selectedTower.w * CELL - 4, selectedTower.h * CELL - 4);
          ctx.restore();
        }
      }
    }

    // ---- Input helpers ----
    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        px: (e.clientX - rect.left) * (canvas.width / rect.width),
        py: (e.clientY - rect.top) * (canvas.height / rect.height),
      };
    }

    // ---- Events ----
    canvas.addEventListener('mousemove', e => {
      const { px, py } = getCanvasPos(e);
      hoverPos = snap(px, py, offsetMode || e.shiftKey, selectedTower.w, selectedTower.h);
      const isOff = hoverPos.x % 1 !== 0 || hoverPos.y % 1 !== 0;
      document.getElementById('status-bar').textContent =
        `Hovrar: (${hoverPos.x}, ${hoverPos.y})${isOff ? '  [offset]' : ''}`;
      render();
    });

    canvas.addEventListener('mouseleave', () => {
      hoverPos = null;
      document.getElementById('status-bar').textContent = 'Hovrar: —';
      render();
    });

    canvas.addEventListener('click', e => {
      const { px, py } = getCanvasPos(e);
      const pos = snap(px, py, offsetMode || e.shiftKey, selectedTower.w, selectedTower.h);
      if (canPlace(pos.x, pos.y, selectedTower.w, selectedTower.h)) {
        towers.push({ x: pos.x, y: pos.y, w: selectedTower.w, h: selectedTower.h, type: selectedTower.type });
        render();
      }
    });

    canvas.addEventListener('contextmenu', e => {
      e.preventDefault();
      const { px, py } = getCanvasPos(e);
      removeTowerAt(px, py);
      render();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Shift') { offsetMode = true; updateOffsetToggle(); render(); }
      if (e.key === 'o' || e.key === 'O') { offsetMode = !offsetMode; updateOffsetToggle(); render(); }
      if (e.key === 'Tab') { e.preventDefault(); cycleTower(); }
    });

    document.addEventListener('keyup', e => {
      if (e.key === 'Shift') { offsetMode = false; updateOffsetToggle(); render(); }
    });

    document.querySelectorAll('.tower-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedTower = { type: btn.dataset.tower, w: parseInt(btn.dataset.w), h: parseInt(btn.dataset.h) };
        render();
      });
    });

    document.getElementById('offset-toggle').addEventListener('click', () => {
      offsetMode = !offsetMode;
      updateOffsetToggle();
      render();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      towers = [];
      render();
    });

    function updateOffsetToggle() {
      const btn = document.getElementById('offset-toggle');
      btn.textContent = `Offset: ${offsetMode ? 'PA' : 'AV'}`;
      btn.classList.toggle('active', offsetMode);
    }

    function cycleTower() {
      const idx = TOWER_ORDER.indexOf(selectedTower.type);
      const next = TOWER_ORDER[(idx + 1) % TOWER_ORDER.length];
      selectedTower = { type: next, ...TOWER_DATA[next] };
      document.querySelectorAll('.tower-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tower === next);
      });
      render();
    }

    render();
  </script>
</body>
</html>
